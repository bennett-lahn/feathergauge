[platformio]
src_dir = sketchbooks/feathergauge_code

[env:feather32u4]
platform = atmelavr
board = feather32u4
framework = arduino
lib_deps =
    file://libraries/SdFat-2.3.1.zip
    file://libraries/RTClib-2.1.4.zip
    file://libraries/Low-Power-1.81.zip
    file://libraries/TimerOne-20251013T165332Z-1-001.zip
    file://libraries/Adafruit_BusIO-master.zip

[native_base_flags]
; Shared build flags reused by all native environments via ${this.build_flags}
build_flags_common =
    -D NATIVE_TEST
    -std=gnu++17
    -I test/mocks

; Exclude SparkFun .cpp from native builds (requires Arduino.h, hardware-only)
; feathergauge_firmware.cpp wraps the .ino for native symbol linkage.
[env:native_continuous]
platform = native
build_flags =
    -D NATIVE_TEST
    -std=gnu++17
    -I test/mocks
    -D DELAY_START=0
    -D BURST_SAMPLING=0
    -D BURST_SAMPLING_ONE_SAMPLE=0
test_build_src = yes
build_src_filter = +<*> -<SparkFun_MS5803_I2C.cpp>

[env:native_burst_multi]
platform = native
build_flags =
    -D NATIVE_TEST
    -std=gnu++17
    -I test/mocks
    -D DELAY_START=0
    -D BURST_SAMPLING=1
    -D BURST_SAMPLING_ONE_SAMPLE=0
test_build_src = yes
build_src_filter = +<*> -<SparkFun_MS5803_I2C.cpp>

[env:native_burst_one]
platform = native
build_flags =
    -D NATIVE_TEST
    -std=gnu++17
    -I test/mocks
    -D DELAY_START=0
    -D BURST_SAMPLING=1
    -D BURST_SAMPLING_ONE_SAMPLE=1
test_build_src = yes
build_src_filter = +<*> -<SparkFun_MS5803_I2C.cpp>

[env:native_delay_continuous]
platform = native
build_flags =
    -D NATIVE_TEST
    -std=gnu++17
    -I test/mocks
    -D DELAY_START=1
    -D BURST_SAMPLING=0
    -D BURST_SAMPLING_ONE_SAMPLE=0
test_build_src = yes
build_src_filter = +<*> -<SparkFun_MS5803_I2C.cpp>

[env:native_delay_burst_multi]
platform = native
build_flags =
    -D NATIVE_TEST
    -std=gnu++17
    -I test/mocks
    -D DELAY_START=1
    -D BURST_SAMPLING=1
    -D BURST_SAMPLING_ONE_SAMPLE=0
test_build_src = yes
build_src_filter = +<*> -<SparkFun_MS5803_I2C.cpp>

[env:native_delay_burst_one]
platform = native
